name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build sidecar (arm64 release)
        run: ./golos-asr/scripts/build-universal.sh
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Build app
        run: |
          xcodebuild \
            -project golos.xcodeproj \
            -scheme golos \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_DEVELOPER_ID }}" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            clean build

      - name: Make DMG
        run: |
          ./Scripts/make-dmg.sh \
            build/Build/Products/Release/golos.app \
            golos.dmg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: ./Scripts/notarize.sh golos.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: golos.dmg
          path: golos.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: golos.dmg
          generate_release_notes: true
